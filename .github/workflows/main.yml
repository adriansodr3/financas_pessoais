name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Verificar estrutura
        run: |
          echo "=== Raiz ==="
          ls -la
          echo "=== screens/ ==="
          ls screens/
          echo "=== buildozer.spec ==="
          cat buildozer.spec

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip python3-pip autoconf automake libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev openjdk-17-jdk build-essential

      - name: Instalar buildozer e cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Cache buildozer SDK/NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v6
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK debug
        run: |
          touch build.log
          yes | buildozer -v android debug 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[1]}
          echo "=== Exit code: $BUILD_EXIT ==="
          tail -60 build.log
          ls -la bin/ 2>/dev/null || echo "bin/ nao existe"
          exit $BUILD_EXIT
        timeout-minutes: 60

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: FinancasPessoais-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload log sempre
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
          retention-days: 7
