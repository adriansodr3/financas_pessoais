name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Extrair ZIP se necessario
        run: |
          if ls *.zip 1>/dev/null 2>&1; then
            echo "ZIP encontrado, extraindo..."
            unzip -o *.zip
            PASTA=$(unzip -l *.zip | awk 'NR==4{print $4}' | cut -d'/' -f1)
            if [ -d "$PASTA" ]; then
              cp -r $PASTA/. .
              rm -rf $PASTA
            fi
            rm -f *.zip
          fi
          ls -la

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip python3-pip autoconf automake libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev openjdk-17-jdk build-essential

      - name: Instalar buildozer e cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Cache buildozer SDK/NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v4
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK debug
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log
        timeout-minutes: 60

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: FinancasPessoais-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload log de erro
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log-erro
          path: build.log
          retention-days: 7
